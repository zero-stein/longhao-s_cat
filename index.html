<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>奶牛猫追毛线球（点击抛球 + 拖拽）</title>
  <style>
    html,body{height:100%;margin:0}
    body{
      display:grid;place-items:center;overflow:hidden;
      background: radial-gradient(circle at 30% 20%, #fff6d7, #bfe9ff 60%, #b7d7ff);
      font-family: ui-sans-serif, system-ui, -apple-system, "PingFang SC","Microsoft YaHei",sans-serif;
      user-select:none;-webkit-user-select:none;touch-action:none;
    }
    canvas{
      width:min(92vw, 900px); height:min(78vh, 560px);
      border-radius:18px; background: linear-gradient(#e9fbff, #ffffff);
      box-shadow: 0 18px 60px rgba(0,0,0,.12);
    }
    .hint{
      position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
      font-size:14px;color:#1f2a44;box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    .hint b{color:#ff4d4d}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hint">点画布抛<b>毛线球</b>；拖拽小猫；点小猫眨眼跳一下</div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  new ResizeObserver(resize).observe(canvas);
  resize();

  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp=(a,b,t)=>a+(b-a)*t;

  const world = {
    w: ()=>canvas.getBoundingClientRect().width,
    h: ()=>canvas.getBoundingClientRect().height,
    g: 1600,           // 重力
    air: 0.995,        // 空气阻力（球）
    groundFric: 0.90,  // 地面摩擦（球滚动）
    bounce: 0.62,
  };

  // “家”——小垫子
  const home = { x: 120, y: 0, r: 42 }; // y在绘制时根据地面算

  // 奶牛猫（几何拼）
  const cat = {
    x: 210, y: 260, r: 70,
    vx: 0, vy: 0,
    dragging: false,
    // 眨眼/小跳
    blink: 0, blinkV: 0,
    hopT: 0, hop: false,
    // 追球行为
    mode: "idle", // idle | chase | carry
    faceDir: 1,   // -1 left, 1 right
    turn: 0,      // 转向平滑
    // 配色（奶牛猫）
    white: "#ffffff",
    black: "#1f2a44",
    pink: "#ff7aa2",
  };

  // 毛线球
  const ball = {
    x: 520, y: 140, r: 22,
    vx: 0, vy: 0,
    active: false,
    carried: false,
    target: { x: 520, y: 200 },
    // 线头摆动
    tailT: 0,
  };

  // Pointer
  const pointer = { id:null, downAt:0, moved:0, px:0, py:0, ox:0, oy:0 };
  function pos(e){
    const r=canvas.getBoundingClientRect();
    return { x:e.clientX-r.left, y:e.clientY-r.top };
  }
  function hitCat(x,y){
    const dx=x-cat.x, dy=y-cat.y;
    return dx*dx+dy*dy <= (cat.r*1.08)*(cat.r*1.08);
  }

  function throwBallTo(x,y){
    // 抛向点击点：给一个“到达时间”，反推初速度（带重力）
    const w=world.w(), h=world.h();
    const groundY = h*0.84;

    ball.active = true;
    ball.carried = false;
    cat.mode = "chase";

    const sx = cat.x + cat.faceDir*cat.r*0.65; // 从猫身边扔出去
    const sy = cat.y - cat.r*0.15;

    ball.x = sx; ball.y = sy;

    // 目标点限制在画布内且不低于地面一点
    const tx = clamp(x, ball.r+8, w-ball.r-8);
    const ty = clamp(y, ball.r+8, groundY-ball.r-6);

    ball.target.x = tx; ball.target.y = ty;

    // 选一个飞行时间：距离越远时间越长
    const dx = tx - sx;
    const dy = ty - sy;
    const dist = Math.hypot(dx, dy);
    const T = clamp(dist / 520, 0.55, 1.05);

    // 反推初速度：tx = sx + vx*T；ty = sy + vy*T + 0.5*g*T^2
    ball.vx = dx / T;
    ball.vy = (dy - 0.5*world.g*T*T) / T;

    // 给点“卡通夸张”
    ball.vx *= 1.03;
    ball.vy *= 1.05;

    // 抛球瞬间猫有点兴奋
    cat.hopT = 0; cat.hop = true;
  }

  function triggerCatClick(){
    cat.blinkV = 9.5;
    cat.hopT = 0; cat.hop = true;
  }

  canvas.addEventListener("pointerdown",(e)=>{
    const p=pos(e);
    pointer.downAt=performance.now();
    pointer.moved=0;
    pointer.px=p.x; pointer.py=p.y;

    if(hitCat(p.x,p.y)){
      pointer.id=e.pointerId;
      canvas.setPointerCapture(pointer.id);
      cat.dragging=true;
      pointer.ox=cat.x-p.x; pointer.oy=cat.y-p.y;
      cat.vx*=0.35; cat.vy*=0.35;
    }
  },{passive:true});

  canvas.addEventListener("pointermove",(e)=>{
    const p=pos(e);
    pointer.moved += Math.hypot(p.x-pointer.px, p.y-pointer.py);
    pointer.px=p.x; pointer.py=p.y;

    if(cat.dragging && e.pointerId===pointer.id){
      const tx=p.x+pointer.ox, ty=p.y+pointer.oy;
      const k=0.35;
      cat.vx += (tx-cat.x)*k;
      cat.vy += (ty-cat.y)*k;
    }
  },{passive:true});

  canvas.addEventListener("pointerup",(e)=>{
    const p=pos(e);
    const dt=performance.now()-pointer.downAt;
    const isTap = pointer.moved<8 && dt<350;

    if(cat.dragging && e.pointerId===pointer.id){
      cat.dragging=false;
      pointer.id=null;
      // 结束拖拽不做抛球
      return;
    }

    // 没在拖猫：点击行为
    if(isTap){
      if(hitCat(p.x,p.y)) triggerCatClick();
      else throwBallTo(p.x,p.y);
    }
  },{passive:true});

  canvas.addEventListener("pointercancel",()=>{
    cat.dragging=false; pointer.id=null;
  },{passive:true});

  // 绘制背景 + 垫子
  function drawBackground(){
    const w=world.w(), h=world.h();
    const groundY = h*0.84;

    ctx.clearRect(0,0,w,h);

    // 云
    const cloud=(cx,cy,s,a)=>{
      ctx.save(); ctx.globalAlpha=a; ctx.fillStyle="#fff";
      ctx.beginPath();
      ctx.arc(cx-26*s,cy,24*s,0,Math.PI*2);
      ctx.arc(cx,cy-10*s,30*s,0,Math.PI*2);
      ctx.arc(cx+28*s,cy,22*s,0,Math.PI*2);
      ctx.arc(cx+8*s,cy+14*s,26*s,0,Math.PI*2);
      ctx.fill(); ctx.restore();
    };
    cloud(130,90,1.0,0.85);
    cloud(520,70,0.85,0.7);
    cloud(740,140,0.95,0.65);

    // 草坡
    ctx.fillStyle="#d9f7c7";
    ctx.beginPath();
    ctx.moveTo(0,h);
    ctx.quadraticCurveTo(w*0.25,h*0.78,w*0.55,h*0.86);
    ctx.quadraticCurveTo(w*0.82,h*0.95,w,h*0.84);
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();

    // “家”垫子
    home.y = groundY - 6;
    ctx.save();
    ctx.translate(home.x, home.y);
    ctx.fillStyle="#ffb3c1";
    ctx.beginPath();
    ctx.ellipse(0,0,home.r*1.2,home.r*0.55,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.55)";
    ctx.beginPath();
    ctx.ellipse(-home.r*0.25,-home.r*0.08,home.r*0.35,home.r*0.18,-0.2,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    return groundY;
  }

  // 画毛线球
  function drawYarnBall(){
    if(!ball.active) return;
    ctx.save();
    ctx.translate(ball.x, ball.y);

    // 主球
    ctx.fillStyle="#ff4d4d";
    ctx.beginPath();
    ctx.arc(0,0,ball.r,0,Math.PI*2);
    ctx.fill();

    // 条纹（毛线感觉）
    ctx.strokeStyle="rgba(255,255,255,.85)";
    ctx.lineWidth=Math.max(2, ball.r*0.12);
    ctx.lineCap="round";
    for(let i=-2;i<=2;i++){
      ctx.beginPath();
      ctx.arc(0,0,ball.r*0.82, (i*0.45)+0.4, (i*0.45)+2.5);
      ctx.stroke();
    }

    // 小高光
    ctx.fillStyle="rgba(255,255,255,.75)";
    ctx.beginPath();
    ctx.ellipse(-ball.r*0.25,-ball.r*0.25, ball.r*0.22, ball.r*0.14, -0.4, 0, Math.PI*2);
    ctx.fill();

    // 线头（摆动）
    ball.tailT += 0.12;
    const wig = Math.sin(ball.tailT) * ball.r*0.15;
    ctx.strokeStyle="rgba(31,42,68,.5)";
    ctx.lineWidth=Math.max(1.5, ball.r*0.08);
    ctx.beginPath();
    ctx.moveTo(ball.r*0.55, ball.r*0.25);
    ctx.quadraticCurveTo(ball.r*1.05, ball.r*0.55 + wig, ball.r*1.35, ball.r*0.15);
    ctx.stroke();

    ctx.restore();
  }

  // 画奶牛猫
  function drawCat(groundY){
    const r = cat.r;

    // 小跳偏移
    let hopOffset=0;
    if(cat.hop){
      cat.hopT += dt * 2.8;
      const t = clamp(cat.hopT,0,1);
      hopOffset = -Math.sin(t*Math.PI) * (r*0.22);
      if(t>=1) cat.hop=false;
    }

    // 转向：根据速度/目标
    const desiredDir = (cat.mode==="chase" || cat.mode==="carry")
      ? Math.sign((ball.x - cat.x) || cat.faceDir)
      : Math.sign(cat.vx || cat.faceDir);
    cat.faceDir = desiredDir===0 ? cat.faceDir : desiredDir;

    // 眨眼
    cat.blink = clamp(cat.blink + cat.blinkV*dt, 0, 1);
    cat.blinkV -= 28*dt;
    if(cat.blink<=0 && cat.blinkV<0) cat.blinkV=0;

    ctx.save();
    ctx.translate(cat.x, cat.y + hopOffset);

    // 身体（简单椭圆）
    ctx.save();
    ctx.fillStyle="rgba(106,167,200,.25)";
    ctx.beginPath();
    ctx.ellipse(0, r*1.05, r*0.95, r*0.20, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 尾巴（追球时摇快点）
    const wagSpeed = (cat.mode==="chase") ? 9 : 5;
    const wag = Math.sin(performance.now()/150 * (wagSpeed/6)) * 0.35;
    ctx.save();
    ctx.translate(-r*0.95, r*0.45);
    ctx.rotate(-0.6 + wag);
    ctx.fillStyle=cat.black;
    ctx.beginPath();
    ctx.roundRect(-r*0.08, -r*0.10, r*0.95, r*0.22, r*0.12);
    ctx.fill();
    ctx.restore();

    // 头部轻微倾斜（追球更有戏）
    const lean = clamp(cat.vx/800, -0.18, 0.18) * 0.6;
    ctx.rotate(lean);

    // 耳朵
    const earTri=(sx)=>{
      ctx.beginPath();
      ctx.moveTo(sx*r*0.62, -r*0.60);
      ctx.quadraticCurveTo(sx*r*0.20, -r*1.12, sx*r*0.06, -r*0.35);
      ctx.quadraticCurveTo(sx*r*0.32, -r*0.52, sx*r*0.62, -r*0.60);
      ctx.closePath();
    };
    ctx.fillStyle=cat.white; earTri(-1); ctx.fill(); earTri(1); ctx.fill();
    ctx.fillStyle="#ffd1dc";
    ctx.save(); ctx.globalAlpha=0.9;
    ctx.beginPath();
    ctx.moveTo(-r*0.50,-r*0.58);
    ctx.quadraticCurveTo(-r*0.22,-r*0.98,-r*0.10,-r*0.40);
    ctx.quadraticCurveTo(-r*0.28,-r*0.52,-r*0.50,-r*0.58);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(r*0.50,-r*0.58);
    ctx.quadraticCurveTo(r*0.22,-r*0.98,r*0.10,-r*0.40);
    ctx.quadraticCurveTo(r*0.28,-r*0.52,r*0.50,-r*0.58);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // 头
    ctx.fillStyle=cat.white;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

    // 奶牛斑（包住左眼 + 右脸一块）
    ctx.fillStyle=cat.black;
    ctx.beginPath();
    ctx.ellipse(-r*0.30, -r*0.10, r*0.55, r*0.48, -0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r*0.28, r*0.22, r*0.40, r*0.30, 0.25, 0, Math.PI*2);
    ctx.fill();

    // 眼睛
    const eyeY=-r*0.08, eyeX=r*0.30;
    const eyeW=r*0.16, openH=r*0.20, closedH=r*0.03;
    const eyeH = lerp(openH, closedH, cat.blink);
    ctx.fillStyle=cat.black;
    ctx.beginPath(); ctx.ellipse(-eyeX,eyeY,eyeW,eyeH,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( eyeX,eyeY,eyeW,eyeH,0,0,Math.PI*2); ctx.fill();

    // 高光
    ctx.save();
    ctx.globalAlpha=(1-cat.blink)*0.95;
    ctx.fillStyle="rgba(255,255,255,.95)";
    ctx.beginPath(); ctx.ellipse(-eyeX-r*0.05,eyeY-r*0.05,r*0.05,r*0.07,-0.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( eyeX-r*0.05,eyeY-r*0.05,r*0.05,r*0.07,-0.2,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // 鼻子 + 嘴
    ctx.fillStyle=cat.pink;
    ctx.beginPath();
    ctx.moveTo(0,r*0.10);
    ctx.quadraticCurveTo(-r*0.09,r*0.02,-r*0.15,r*0.10);
    ctx.quadraticCurveTo(-r*0.02,r*0.21,0,r*0.14);
    ctx.quadraticCurveTo(r*0.02,r*0.21,r*0.15,r*0.10);
    ctx.quadraticCurveTo(r*0.09,r*0.02,0,r*0.10);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle="rgba(31,42,68,.85)";
    ctx.lineWidth=Math.max(2,r*0.03);
    ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(0,r*0.16);
    ctx.quadraticCurveTo(-r*0.10,r*0.24,-r*0.22,r*0.19);
    ctx.moveTo(0,r*0.16);
    ctx.quadraticCurveTo(r*0.10,r*0.24,r*0.22,r*0.19);
    ctx.stroke();

    // 胡须
    ctx.strokeStyle="rgba(31,42,68,.55)";
    ctx.lineWidth=Math.max(1.5,r*0.02);
    const wy=r*0.18;
    for(let i=-1;i<=1;i++){
      const off=i*r*0.10;
      ctx.beginPath();
      ctx.moveTo(-r*0.18,wy+off);
      ctx.quadraticCurveTo(-r*0.55,wy+off-r*0.05,-r*0.78,wy+off);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(r*0.18,wy+off);
      ctx.quadraticCurveTo(r*0.55,wy+off-r*0.05,r*0.78,wy+off);
      ctx.stroke();
    }

    ctx.restore();
  }

  // 行为：猫追球/叼回
  function updateCatAI(groundY){
    if(cat.dragging) return;

    // 猫的“脚下”限制
    const pad = cat.r*0.95;

    // 当球被叼住：球跟随猫嘴巴位置
    if(ball.carried){
      const mouthX = cat.x + cat.faceDir*cat.r*0.70;
      const mouthY = cat.y + cat.r*0.25;
      ball.x = mouthX;
      ball.y = mouthY;
      ball.vx = ball.vy = 0;

      // 往家走
      const tx = home.x;
      const ty = home.y - cat.r*0.25;

      const dx = tx - cat.x;
      const dy = ty - cat.y;
      const dist = Math.hypot(dx,dy);

      const maxV = 520;
      const acc = 1800;

      // 速度趋向目标
      const desiredVx = (dx / (dist||1)) * maxV;
      const desiredVy = (dy / (dist||1)) * maxV;
      cat.vx += clamp(desiredVx - cat.vx, -acc*dt, acc*dt);
      cat.vy += clamp(desiredVy - cat.vy, -acc*dt, acc*dt);

      // 到家放下
      if(dist < 28){
        ball.carried = false;
        cat.mode = "idle";
        // 放在垫子上
        ball.x = home.x + 18;
        ball.y = home.y - ball.r*0.55;
        ball.active = true;
        // 小庆祝
        cat.hopT = 0; cat.hop = true;
      }
      return;
    }

    // 追球：球还在动 or 停住都追
    if(cat.mode === "chase" && ball.active){
      const tx = ball.x;
      const ty = clamp(ball.y, pad, groundY - pad);

      const dx = tx - cat.x;
      const dy = ty - cat.y;
      const dist = Math.hypot(dx,dy);

      const maxV = dist > 220 ? 720 : 560;
      const acc = 2200;

      // 目标速度
      const nx = dx / (dist||1);
      const ny = dy / (dist||1);
      const desiredVx = nx * maxV;
      const desiredVy = ny * maxV;

      // 转向/加速度限制
      cat.vx += clamp(desiredVx - cat.vx, -acc*dt, acc*dt);
      cat.vy += clamp(desiredVy - cat.vy, -acc*dt, acc*dt);

      // 追到球：叼住（距离阈值）
      if(dist < cat.r*0.78 && Math.hypot(ball.vx, ball.vy) < 900){
        ball.carried = true;
        cat.mode = "carry";
        // 叼住瞬间眨眼一下
        cat.blinkV = 10;
      }
    } else {
      // idle：轻微阻尼停下来
      cat.vx *= 0.94;
      cat.vy *= 0.94;
    }
  }

  // 更新毛线球物理
  function updateBall(groundY){
    if(!ball.active) return;
    if(ball.carried) return;

    ball.vy += world.g * dt;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // 空气阻力
    ball.vx *= Math.pow(world.air, dt*60);
    ball.vy *= Math.pow(world.air, dt*60);

    // 边界 + 地面碰撞
    const w=world.w(), h=world.h();
    const pad = ball.r + 6;

    // 左右墙
    if(ball.x < pad){ ball.x = pad; ball.vx = Math.abs(ball.vx) * world.bounce; }
    if(ball.x > w-pad){ ball.x = w-pad; ball.vx = -Math.abs(ball.vx) * world.bounce; }

    // 顶部
    if(ball.y < pad){ ball.y = pad; ball.vy = Math.abs(ball.vy) * world.bounce; }

    // 地面
    if(ball.y > groundY - ball.r){
      ball.y = groundY - ball.r;
      ball.vy = -Math.abs(ball.vy) * world.bounce;

      // 地面滚动摩擦
      ball.vx *= world.groundFric;

      // 如果弹跳很小：逐渐停下
      if(Math.abs(ball.vy) < 120){
        ball.vy = 0;
        // 更强摩擦让它停
        ball.vx *= 0.88;
        if(Math.abs(ball.vx) < 18){
          ball.vx = 0;
          // 球基本停住，猫仍可追来叼走
        }
      }
    }
  }

  // 猫自身物理
  function updateCatPhysics(groundY){
    if(cat.dragging){
      cat.x += cat.vx * dt;
      cat.y += cat.vy * dt;
      cat.vx *= 0.88; cat.vy *= 0.88;
    } else {
      cat.x += cat.vx * dt;
      cat.y += cat.vy * dt;
      // 轻微阻尼
      cat.vx *= 0.985;
      cat.vy *= 0.985;
    }

    // 边界
    const w=world.w(), h=world.h();
    const pad = cat.r*0.95;
    cat.x = clamp(cat.x, pad, w - pad);
    cat.y = clamp(cat.y, pad, groundY - pad);
  }

  // 主循环
  let last = performance.now();
  let dt = 1/60;

  function loop(now){
    dt = Math.min(0.033, (now-last)/1000);
    last = now;

    const groundY = drawBackground();

    updateBall(groundY);
    updateCatAI(groundY);
    updateCatPhysics(groundY);

    drawYarnBall();
    drawCat(groundY);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
